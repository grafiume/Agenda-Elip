<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f7f7f5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Agenda ELIP">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<title>Agenda ELIP</title>
<style>
:root{--bg:#f7f7f5;--line:#d8d8d4;--text:#222;--muted:#666;--green:#dfeedd;--red:#f7dede;--yellow:#fff0bf;--blue:#e2edf8;--purple:#e9def5;--orange:#ffe4c9}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,select,textarea{font:inherit}.app{min-height:100vh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}header{position:sticky;top:0;z-index:20;background:rgba(247,247,245,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.toolbar{display:flex;gap:8px;align-items:center;padding:10px;overflow-x:auto}.toolbar button{min-height:44px}button{border:1px solid var(--line);background:white;border-radius:12px;padding:10px 12px;white-space:nowrap;color:#1670e8}button.primary{background:#287642;color:white;border-color:#287642}.week-title{font-weight:700;padding:0 12px 12px;text-align:center;font-size:18px}.calendar-wrap{overflow-x:auto;overflow-y:visible;background:white;-webkit-overflow-scrolling:touch}.calendar{display:grid;grid-template-columns:68px repeat(7,128px);grid-auto-flow:row;min-width:964px}.head,.time,.cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.head{height:68px;background:#f4f8f2;padding:10px 4px;text-align:center;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1.25}.head.weekend{background:#fff3ef;color:#9d2e2e}.corner{background:#fafafa}.time{height:76px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:#fafafa;font-size:14px;padding:0 4px}.cell{height:76px;padding:5px;background:#fff;overflow:hidden}.cell.weekend{background:#fffaf8}.event{display:block;width:100%;border:0;border-radius:8px;padding:6px;margin:0 0 3px;text-align:left;white-space:normal;overflow:hidden;text-overflow:ellipsis;line-height:1.15;font-size:13px;color:#222}.event.low{background:var(--green)}.event.medium{background:var(--yellow)}.event.high{background:var(--red)}.event.done{text-decoration:line-through;opacity:.65}.notes-grid{display:grid;grid-template-columns:1fr;gap:10px;padding:10px}.note-card{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:white}.note-card h3{margin:0;padding:10px 12px;font-size:16px}.note-card textarea{width:100%;min-height:110px;border:0;border-top:1px solid var(--line);padding:12px;resize:vertical;background:white}.green h3{background:var(--green)}.blue h3{background:var(--blue)}.purple h3{background:var(--purple)}.orange h3{background:var(--orange)}.red h3{background:var(--red)}.yellow h3{background:var(--yellow)}dialog{border:0;border-radius:20px;padding:0;width:min(94vw,560px);max-height:90vh}dialog::backdrop{background:rgba(0,0,0,.38)}.modal{padding:18px;overflow:auto;max-height:90vh}.modal h2{margin-top:0}label{display:block;font-weight:600;margin:12px 0 5px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px;background:white}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions,.attachments{display:flex;gap:8px;flex-wrap:wrap}.actions{justify-content:flex-end;margin-top:16px}.attachments{margin-top:8px}.photo-choice button{flex:1}.status{padding:10px 12px;color:var(--muted);font-size:14px}.history-item{border-bottom:1px solid var(--line);padding:12px 0}.history-item strong{display:block}.hidden{display:none!important}@media(min-width:900px){.notes-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="app">
<header><div class="toolbar"><button id="prev">◀</button><button id="today">Oggi</button><button id="next">▶</button><button class="primary" id="newEvent">＋ Nuovo</button><button id="historyBtn">Storico</button></div><div class="week-title" id="weekTitle"></div></header>
<div class="calendar-wrap"><div class="calendar" id="calendar"></div></div>
<div class="notes-grid">
<section class="note-card green"><h3>Ha telefonato</h3><textarea data-note="called"></textarea></section>
<section class="note-card blue"><h3>Note</h3><textarea data-note="notes"></textarea></section>
<section class="note-card purple"><h3>Importante</h3><textarea data-note="important"></textarea></section>
<section class="note-card orange"><h3>Telefonare</h3><textarea data-note="call"></textarea></section>
<section class="note-card red"><h3>Promemoria</h3><textarea data-note="reminder"></textarea></section>
<section class="note-card yellow"><h3>Appunti del weekend</h3><textarea data-note="weekend"></textarea></section>
</div><div class="status" id="status"></div></div>
<dialog id="eventDialog"><div class="modal"><h2 id="eventTitle">Nuovo appuntamento</h2><input type="hidden" id="eventId"><label>Attività</label><input id="title" autocomplete="off"><div class="row"><div><label>Data</label><input type="date" id="date"></div><div><label>Ora</label><input type="time" id="time"></div></div><div class="row"><div><label>Priorità</label><select id="priority"><option>Bassa</option><option selected>Media</option><option>Alta</option></select></div><div><label>Stato</label><select id="state"><option>Da fare</option><option>In corso</option><option>Completato</option><option>Archiviato</option></select></div></div><label>Allarme</label><div class="row"><select id="alarmOn"><option value="yes">Attivo</option><option value="no">Disattivato</option></select><input type="number" id="alarmMinutes" min="0" max="1440" value="15" aria-label="Minuti prima"></div><label>Note</label><textarea id="eventNotes" rows="4"></textarea><label>Fotografia</label><div class="attachments photo-choice"><button id="choosePhotoBtn" type="button">🖼️ Scegli dalla libreria</button><button id="takePhotoBtn" type="button">📷 Scatta foto</button></div><input class="hidden" type="file" accept="image/*" id="photoLibraryInput"><input class="hidden" type="file" accept="image/*" capture="environment" id="photoCameraInput"><div class="attachments"><span id="photoName">Nessuna foto</span><button id="openPhoto" type="button" class="hidden">Apri foto</button></div><label>Nota vocale</label><div class="attachments"><button id="recordBtn" type="button">● Registra</button><button id="stopBtn" type="button" disabled>■ Ferma</button><button id="playBtn" type="button" class="hidden">▶ Ascolta</button></div><div class="actions"><button id="deleteBtn" type="button">Elimina</button><button id="cancelBtn" type="button">Annulla</button><button class="primary" id="saveBtn" type="button">Salva</button></div></div></dialog>
<dialog id="historyDialog"><div class="modal"><h2>Storico</h2><div id="historyList"></div><div class="actions"><button id="closeHistory">Chiudi</button></div></div></dialog>
<script>
const DB_NAME='AgendaELIPDB',STORE='data';let db,weekStart=startOfWeek(new Date()),currentEvent=null,mediaRecorder=null,audioChunks=[],pendingPhoto=null,pendingAudio=null;
const $=id=>document.getElementById(id);function startOfWeek(d){const x=new Date(d),day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x}function isoDate(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`}function pad(n){return String(n).padStart(2,'0')}function fmtDate(d){return new Intl.DateTimeFormat('it-IT',{day:'2-digit',month:'long',year:'numeric'}).format(d)}function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random()}function req(r){return new Promise((a,b)=>{r.onsuccess=()=>a(r.result);r.onerror=()=>b(r.error)})}
async function openDB(){return new Promise((a,b)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains(STORE))r.result.createObjectStore(STORE)};r.onsuccess=()=>a(r.result);r.onerror=()=>b(r.error)})}async function getData(){const t=db.transaction(STORE,'readonly');return(await req(t.objectStore(STORE).get('app')))||{events:[],notes:{}}}async function saveData(d){const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).put(d,'app');return new Promise((a,b)=>{t.oncomplete=a;t.onerror=()=>b(t.error)})}
async function render(){const data=await getData(),cal=$('calendar');cal.innerHTML='<div class="head corner"></div>';const names=['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];for(let d=0;d<7;d++){const x=new Date(weekStart);x.setDate(x.getDate()+d);cal.insertAdjacentHTML('beforeend',`<div class="head ${d>4?'weekend':''}">${names[d]}<br>${pad(x.getDate())}</div>`)}for(let h=8;h<=20;h++){cal.insertAdjacentHTML('beforeend',`<div class="time">${pad(h)}:00</div>`);for(let d=0;d<7;d++){const x=new Date(weekStart);x.setDate(x.getDate()+d);const evs=data.events.filter(e=>e.date===isoDate(x)&&Number(e.time.slice(0,2))===h&&e.state!=='Archiviato');const box=document.createElement('div');box.className='cell '+(d>4?'weekend':'');box.dataset.date=isoDate(x);box.dataset.time=pad(h)+':00';evs.forEach(e=>{const b=document.createElement('button');b.className='event '+({Bassa:'low',Media:'medium',Alta:'high'}[e.priority]||'medium')+(e.state==='Completato'?' done':'');b.textContent=e.time+' '+e.title;b.onclick=ev=>{ev.stopPropagation();openEditor(e.id)};box.appendChild(b)});box.onclick=()=>openEditor(null,box.dataset.date,box.dataset.time);cal.appendChild(box)}}const end=new Date(weekStart);end.setDate(end.getDate()+6);$('weekTitle').textContent=fmtDate(weekStart)+' – '+fmtDate(end);$('status').textContent=`Attività: ${data.events.length} • Salvataggio automatico sul tuo iPhone`;document.querySelectorAll('[data-note]').forEach(t=>t.value=data.notes[t.dataset.note]||'')}
async function openEditor(id,date=isoDate(new Date()),time=pad(new Date().getHours())+':00'){const data=await getData();currentEvent=id?data.events.find(e=>e.id===id):null;const e=currentEvent||{id:'',title:'',date,time,priority:'Media',state:'Da fare',alarmOn:'yes',alarmMinutes:15,notes:'',photo:null,audio:null,alarmShown:false};pendingPhoto=e.photo||null;pendingAudio=e.audio||null;$('eventTitle').textContent=id?'Modifica appuntamento':'Nuovo appuntamento';$('eventId').value=e.id;$('title').value=e.title;$('date').value=e.date;$('time').value=e.time;$('priority').value=e.priority;$('state').value=e.state;$('alarmOn').value=e.alarmOn||'yes';$('alarmMinutes').value=e.alarmMinutes??15;$('eventNotes').value=e.notes||'';$('photoName').textContent=e.photo?.name||'Nessuna foto';$('openPhoto').classList.toggle('hidden',!e.photo);$('playBtn').classList.toggle('hidden',!e.audio);$('deleteBtn').classList.toggle('hidden',!id);$('photoLibraryInput').value='';$('photoCameraInput').value='';$('eventDialog').showModal()}
async function fileAttachment(f){return f?{name:f.name||'foto.jpg',type:f.type||'image/jpeg',data:await f.arrayBuffer()}:null}async function handlePhoto(input){if(input.files&&input.files[0]){pendingPhoto=await fileAttachment(input.files[0]);$('photoName').textContent=pendingPhoto.name;$('openPhoto').classList.remove('hidden')}}
async function saveEvent(){if(!$('title').value.trim()){alert('Scrivi il nome dell’attività');return}const data=await getData(),id=$('eventId').value||uid(),old=data.events.find(e=>e.id===id)||{};const e={...old,id,title:$('title').value.trim(),date:$('date').value,time:$('time').value,priority:$('priority').value,state:$('state').value,alarmOn:$('alarmOn').value,alarmMinutes:Number($('alarmMinutes').value||0),notes:$('eventNotes').value,photo:pendingPhoto,audio:pendingAudio,alarmShown:false,created:old.created||new Date().toISOString()};const i=data.events.findIndex(x=>x.id===id);if(i>=0)data.events[i]=e;else data.events.push(e);await saveData(data);$('eventDialog').close();render()}async function deleteEvent(){if(!$('eventId').value||!confirm('Eliminare questo appuntamento?'))return;const data=await getData();data.events=data.events.filter(e=>e.id!==$('eventId').value);await saveData(data);$('eventDialog').close();render()}function openBlob(a){if(!a)return;const u=URL.createObjectURL(new Blob([a.data],{type:a.type||'application/octet-stream'}));window.open(u,'_blank');setTimeout(()=>URL.revokeObjectURL(u),30000)}
async function startRecording(){try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});audioChunks=[];mediaRecorder=new MediaRecorder(stream);mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);mediaRecorder.onstop=async()=>{const blob=new Blob(audioChunks,{type:mediaRecorder.mimeType||'audio/webm'});pendingAudio={name:'nota-vocale',type:blob.type,data:await blob.arrayBuffer()};$('playBtn').classList.remove('hidden');stream.getTracks().forEach(t=>t.stop())};mediaRecorder.start();$('recordBtn').disabled=true;$('stopBtn').disabled=false}catch(e){alert('Consenti l’uso del microfono nelle impostazioni di Safari.')}}function stopRecording(){if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();$('recordBtn').disabled=false;$('stopBtn').disabled=true}
async function showHistory(){const data=await getData();$('historyList').innerHTML='';[...data.events].sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time)).forEach(e=>{const d=document.createElement('div');d.className='history-item';d.innerHTML=`<strong>${e.title}</strong>${e.date.split('-').reverse().join('/')} ${e.time} • ${e.state}<br><small>${e.notes||''}</small>`;d.onclick=()=>{$('historyDialog').close();openEditor(e.id)};$('historyList').appendChild(d)});if(!data.events.length)$('historyList').textContent='Nessun appuntamento salvato.';$('historyDialog').showModal()}
async function checkAlarms(){const data=await getData();let changed=false,now=Date.now();for(const e of data.events){if(e.alarmOn!=='yes'||e.alarmShown||['Completato','Archiviato'].includes(e.state))continue;const when=new Date(`${e.date}T${e.time}:00`).getTime(),alarm=when-e.alarmMinutes*60000;if(now>=alarm&&now<=when+600000){alert(`Promemoria\n\n${e.title}\n${e.date.split('-').reverse().join('/')} ${e.time}`);e.alarmShown=true;changed=true}}if(changed)await saveData(data)}
$('prev').onclick=()=>{weekStart.setDate(weekStart.getDate()-7);render()};$('next').onclick=()=>{weekStart.setDate(weekStart.getDate()+7);render()};$('today').onclick=()=>{weekStart=startOfWeek(new Date());render()};$('newEvent').onclick=()=>openEditor();$('historyBtn').onclick=showHistory;$('saveBtn').onclick=saveEvent;$('cancelBtn').onclick=()=>$('eventDialog').close();$('deleteBtn').onclick=deleteEvent;$('closeHistory').onclick=()=>$('historyDialog').close();$('recordBtn').onclick=startRecording;$('stopBtn').onclick=stopRecording;$('playBtn').onclick=()=>openBlob(pendingAudio);$('openPhoto').onclick=()=>openBlob(pendingPhoto);$('choosePhotoBtn').onclick=()=>$('photoLibraryInput').click();$('takePhotoBtn').onclick=()=>$('photoCameraInput').click();$('photoLibraryInput').onchange=()=>handlePhoto($('photoLibraryInput'));$('photoCameraInput').onchange=()=>handlePhoto($('photoCameraInput'));document.querySelectorAll('[data-note]').forEach(t=>t.addEventListener('input',async()=>{const data=await getData();data.notes[t.dataset.note]=t.value;await saveData(data)}));
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');(async()=>{db=await openDB();await render();setInterval(checkAlarms,30000)})();
</script>
</body>
</html>
